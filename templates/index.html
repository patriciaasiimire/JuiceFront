{% extends "_base.html" %}
{% block body %}

<!-- <section class="hero">
  <h1>Fresh Juice Delivered</h1>
  <p>Order in seconds from your favorite local vendors in Nansana.</p>
</section> -->

<main class="wrap">
  <div class="grid">
    {% for v in vendors %}
      <a class="card" href="{{ url_for('vendor_detail', vid=v.id) }}">
        <img src="{{ v.photo }}" alt="{{ v.juice }}">
        <div class="card-body">
          <h3>{{ v.name }}</h3>
          <div class="juice">{{ v.juice }}</div>
          <div class="row">
            <span class="price">UGX {{ '{:,}'.format(v.price) }}</span>
            <span class="btn" style="padding:8px 16px;font-size:14px;">Order</span>
          </div>
        </div>
      </a>
    {% endfor %}
  </div>
</main>
{% endblock %}
