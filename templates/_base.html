<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JuiceFront — Fresh Juice Delivered{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="header">
    <a href="{{ url_for('home') }}" class="logo">Juice<span>Front</span></a>
    <nav>
      {% if session.get('staff') %}
        <a href="{{ url_for('operator') }}">Operator</a>
        <a href="{{ url_for('orders') }}">Orders</a>
        <a href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}">Staff</a>
      {% endif %}
    </nav>
  </header>
  {% block body %}{% endblock %}
</body>
</html>
